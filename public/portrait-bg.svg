<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="2970" viewBox="0 0 2100 2970">
  <!-- Background -->
  <rect width="2100" height="2970" fill="#ffffff" />
  
  <!-- Header -->
  <g transform="translate(100, 100)">
    <!-- PT Logo -->
    <circle cx="50" cy="50" r="40" fill="none" stroke="#34d399" stroke-width="15" />
    <text x="50" y="65" font-family="sans-serif" font-size="40" font-weight="bold" fill="#ef4444" text-anchor="middle">PT</text>
    
    <!-- SONGKHLA GRANDPRIX -->
    <text x="120" y="60" font-family="sans-serif" font-size="60" font-weight="900" fill="#000000">SONGKHLA</text>
    <text x="120" y="90" font-family="sans-serif" font-size="24" font-weight="bold" fill="#000000" letter-spacing="5">GRANDPRIX</text>
  </g>

  <!-- Header Right Logos -->
  <g transform="translate(1200, 140)">
    <circle cx="0" cy="0" r="30" fill="#3b82f6" opacity="0.8" />
    <circle cx="80" cy="0" r="30" fill="#ec4899" opacity="0.8" />
    <circle cx="160" cy="0" r="30" fill="#eab308" opacity="0.8" />
    <circle cx="240" cy="0" r="30" fill="#06b6d4" opacity="0.8" />
    <circle cx="320" cy="0" r="30" fill="#6366f1" opacity="0.8" />
    <circle cx="400" cy="0" r="30" fill="#f97316" opacity="0.8" />
    <circle cx="480" cy="0" r="30" fill="#8b5cf6" opacity="0.8" />
    <circle cx="560" cy="0" r="30" fill="#10b981" opacity="0.8" />
    <circle cx="640" cy="0" r="30" fill="#f43f5e" opacity="0.8" />
  </g>

  <!-- Footer Logos -->
  <g transform="translate(100, 2850)">
    <!-- Draw a series of small rectangles to mimic sponsor logos -->
    <rect x="0" y="0" width="80" height="40" fill="#10b981" rx="5" />
    <rect x="100" y="0" width="120" height="40" fill="#000000" rx="5" />
    <rect x="240" y="0" width="100" height="40" fill="#f59e0b" rx="5" />
    <rect x="360" y="0" width="60" height="40" fill="#374151" rx="5" />
    <rect x="440" y="0" width="100" height="40" fill="#84cc16" rx="5" />
    <rect x="560" y="0" width="80" height="40" fill="#14b8a6" rx="5" />
    <rect x="660" y="0" width="120" height="40" fill="#ef4444" rx="5" />
    <rect x="800" y="0" width="90" height="40" fill="#3b82f6" rx="5" />
    <rect x="910" y="0" width="110" height="40" fill="#f97316" rx="5" />
    <rect x="1040" y="0" width="70" height="40" fill="#8b5cf6" rx="5" />
    <rect x="1130" y="0" width="130" height="40" fill="#0ea5e9" rx="5" />
    <rect x="1280" y="0" width="80" height="40" fill="#10b981" rx="5" />
    <rect x="1380" y="0" width="100" height="40" fill="#64748b" rx="5" />
    <rect x="1500" y="0" width="120" height="40" fill="#ef4444" rx="5" />
    <rect x="1640" y="0" width="90" height="40" fill="#eab308" rx="5" />
    <rect x="1750" y="0" width="150" height="40" fill="#22c55e" rx="5" />
  </g>
</svg>
